{% extends "base.html" %}

{% block title %}Transport Needed? | Sundowns WPA{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow p-8 text-center">

    <h1 class="text-3xl font-bold text-green-900 mb-4">
        Ticket Booked Successfully
    </h1>

    <p class="text-gray-700 mb-6">
        You booked a ticket for
        <span class="font-semibold">
            Sundowns vs {{ ticket.match.opponent }}
        </span>.
    </p>

    <p class="text-gray-700 mb-8">
        Do you need transport for this match?
    </p>

    <form method="POST" class="flex justify-center gap-4">
        {% csrf_token %}

        <button
            type="submit"
            name="transport_choice"
            value="yes"
            class="bg-green-800 text-white px-5 py-3 rounded font-semibold hover:bg-green-700"
        >
            Yes, show transport
        </button>

        <button
            type="submit"
            name="transport_choice"
            value="no"
            class="bg-gray-900 text-white px-5 py-3 rounded font-semibold hover:bg-gray-800"
        >
            No, view my tickets
        </button>
    </form>

</div>
{% endblock %}
