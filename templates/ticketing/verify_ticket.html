{% extends "base.html" %}

{% block title %}Verify Ticket | Sundowns WPA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8">

    <h1 class="text-2xl font-bold text-green-900 mb-6">
        Verify Ticket
    </h1>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block mb-1 font-medium">
                QR Code / Ticket UUID
            </label>

            <input
                type="text"
                name="qr_code"
                class="w-full border rounded px-4 py-2"
                required
            >
        </div>

        <button
            type="submit"
            class="w-full bg-green-800 text-white py-3 rounded font-semibold hover:bg-green-700"
        >
            Verify Ticket
        </button>
    </form>

</div>
{% endblock %}
