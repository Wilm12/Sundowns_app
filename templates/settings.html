{% extends "base.html" %}

{% block title %}Settings | Sundowns WPA{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow p-8">

    <h1 class="text-3xl font-bold text-green-900 mb-6">
        Account Settings
    </h1>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
            <label class="block mb-1 font-medium">Username</label>
            <input
                type="text"
                name="username"
                value="{{ request.user.username }}"
                class="w-full border rounded px-4 py-2"
                required
            >
        </div>

        <div>
            <label class="block mb-1 font-medium">Email</label>
            <input
                type="email"
                name="email"
                value="{{ request.user.email }}"
                class="w-full border rounded px-4 py-2"
                required
            >
        </div>

        <div>
            <label class="block mb-1 font-medium">Branch</label>
            <select
                name="branch"
                class="w-full border rounded px-4 py-2"
                required
            >
                {% for branch in branches %}
                    <option
                        value="{{ branch.id }}"
                        {% if request.user.branch_id == branch.id %}selected{% endif %}
                    >
                        {{ branch.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <button
            type="submit"
            class="w-full bg-green-800 text-white py-3 rounded font-semibold hover:bg-green-700"
        >
            Save Settings
        </button>
    </form>

</div>
{% endblock %}
