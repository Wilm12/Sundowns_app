{% extends "base.html" %}

{% block title %}Verify Ticket | Sundowns WPA{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-8">

    <h1 class="text-2xl font-bold text-green-900 mb-6">
        Verify Ticket
    </h1>

    <div class="mb-6">
        <button
            id="start-scanner"
            type="button"
            class="w-full bg-yellow-500 text-green-900 py-3 rounded font-semibold hover:bg-yellow-400 mb-4"
        >
            Start Camera Scanner
        </button>

        <div id="reader" class="w-full"></div>
    </div>

    <form method="POST" class="space-y-4" id="verify-form">
        {% csrf_token %}

        <div>
            <label class="block mb-1 font-medium">
                QR Code / Ticket UUID
            </label>

            <input
                id="qr-input"
                type="text"
                name="qr_code"
                class="w-full border rounded px-4 py-2"
                required
            >
        </div>

        <button
            type="submit"
            class="w-full bg-green-800 text-white py-3 rounded font-semibold hover:bg-green-700"
        >
            Verify Ticket
        </button>
    </form>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    const startButton = document.getElementById("start-scanner");
    const qrInput = document.getElementById("qr-input");
    const verifyForm = document.getElementById("verify-form");

    let scannerStarted = false;

    startButton.addEventListener("click", function () {
        if (scannerStarted) {
            return;
        }

        scannerStarted = true;

        const html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            {
                fps: 10,
                qrbox: 250
            },
            function (decodedText) {
                qrInput.value = decodedText;

                html5QrCode.stop().then(function () {
                    verifyForm.submit();
                });
            },
            function (errorMessage) {
                // Ignore scan errors while camera is searching
            }
        ).catch(function (err) {
            alert("Could not start camera scanner. Check camera permissions.");
            scannerStarted = false;
        });
    });
</script>
{% endblock %}
