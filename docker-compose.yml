version: '3.9'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev   # swap with .env.test or .env.prod
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A sundowns_app worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.dev   # swap with .env.test or .env.prod
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  redis_data:
